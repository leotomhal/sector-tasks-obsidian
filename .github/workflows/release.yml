name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build matches the committed main.js
        run: |
          if ! git diff --exit-code main.js; then
            echo "::error::Building from source produced a different main.js than the tag's committed version. Refusing to release a mismatched artifact."
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "main.js, manifest.json, styles.css"

      - name: Create release or attach assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber \
              main.js manifest.json styles.css
            # Fill in auto-generated notes if the release body is still empty
            # (e.g. a release drafted through the GitHub UI without notes).
            body="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
            if [ -z "$body" ]; then
              gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --generate-notes
            fi
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
