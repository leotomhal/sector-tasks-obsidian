name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify main.js matches the committed build
        run: |
          if ! git diff --exit-code main.js; then
            echo "::error::main.js is out of date with src/. Run 'npm run build' and commit the result."
            exit 1
          fi
      - name: Run tests
        run: node --test
